<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProHosts Revenue Manager</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222537;--border:#2e3147;
  --accent:#e8a045;--accent2:#5b8ef0;--green:#3ecf8e;--red:#f05b5b;
  --yellow:#f0c55b;--orange:#f07c3a;--text:#e8eaf0;--text-muted:#7b82a0;--text-dim:#4a5070;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;min-height:100vh;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#000;}
.logo-text{font-weight:600;font-size:14px;}
.logo-sub{color:var(--text-muted);font-size:11px;margin-left:4px;}
.review-date{color:var(--text-muted);font-size:11px;font-family:var(--mono);}
.api-key-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.api-key-label{font-size:11px;color:var(--text-muted);white-space:nowrap;font-weight:600;}
.api-key-input{flex:1;max-width:400px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .2s;}
.api-key-input:focus{border-color:var(--accent);}
.api-key-input.valid{border-color:var(--green);}
.api-key-status{font-size:11px;font-family:var(--mono);}

.api-key-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:12px;}
.api-key-label{font-size:11px;color:var(--text-muted);white-space:nowrap;}
.api-key-input{flex:1;max-width:420px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;}
.api-key-input:focus{border-color:var(--accent);}
.api-key-input.valid{border-color:var(--green);}
.api-key-status{font-size:11px;font-family:var(--mono);}
.upload-zone{margin:24px;border:1.5px dashed var(--border);border-radius:12px;padding:32px;text-align:center;cursor:pointer;background:var(--surface);transition:border-color .2s,background .2s;}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(232,160,69,.04);}
.upload-icon{font-size:28px;margin-bottom:10px;}
.upload-title{font-weight:600;font-size:15px;margin-bottom:6px;}
.upload-sub{color:var(--text-muted);font-size:12px;}
.upload-hint{color:var(--text-dim);font-size:11px;margin-top:8px;font-family:var(--mono);}
#csv-input{display:none;}
.file-loaded{display:flex;align-items:center;gap:10px;background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.25);border-radius:8px;padding:12px 16px;margin:0 24px;}
.file-loaded-icon{color:var(--green);font-size:16px;}
.run-section{padding:16px 24px 24px;display:flex;align-items:center;gap:12px;}
.btn-run{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 24px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:opacity .2s;font-family:var(--font);}
.btn-run:hover{opacity:.9;}
.btn-run:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;cursor:pointer;font-family:var(--font);}
.btn-secondary:hover{background:var(--border);}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.tabs-wrapper{padding:0 24px;border-bottom:1px solid var(--border);display:flex;gap:2px;overflow-x:auto;}
.tab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);}
.tab-dot.green{background:var(--green);}
.tab-dot.yellow{background:var(--yellow);}
.tab-dot.orange{background:var(--orange);}
.tab-dot.red{background:var(--red);}
.tab-content{display:none;padding:24px;}
.tab-content.active{display:block;}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:24px;}
.portfolio-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s;}
.portfolio-card:hover{border-color:var(--accent2);}
.portfolio-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.portfolio-card-name{font-weight:600;font-size:13px;}
.portfolio-card-market{color:var(--text-muted);font-size:11px;margin-top:2px;}
.status-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;font-family:var(--mono);}
.status-badge.pending{background:rgba(123,130,160,.15);color:var(--text-muted);}
.status-badge.ok{background:rgba(62,207,142,.15);color:var(--green);}
.status-badge.alert{background:rgba(240,91,91,.15);color:var(--red);}
.status-badge.warn{background:rgba(240,197,91,.15);color:var(--yellow);}
.pace-bars{display:flex;flex-direction:column;gap:5px;}
.pace-row{display:flex;align-items:center;gap:8px;}
.pace-label{color:var(--text-muted);font-size:10px;width:28px;font-family:var(--mono);}
.pace-bar-wrap{flex:1;height:4px;background:var(--surface2);border-radius:2px;}
.pace-bar{height:100%;border-radius:2px;transition:width .4s;}
.pace-val{font-size:10px;font-family:var(--mono);width:32px;text-align:right;}
.prop-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.prop-title{font-size:18px;font-weight:700;letter-spacing:-.4px;}
.prop-meta{color:var(--text-muted);font-size:12px;margin-top:3px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.full{grid-column:1/-1;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
.card-header{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);}
.card-source{font-size:10px;color:var(--text-dim);font-family:var(--mono);}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:7px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);}
td{padding:8px 12px;border-bottom:1px solid rgba(46,49,71,.5);font-size:12px;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.mono{font-family:var(--mono);}
.muted{color:var(--text-muted);}
.dim{color:var(--text-dim);}
.green{color:var(--green);}
.red{color:var(--red);}
.yellow{color:var(--yellow);}
.orange{color:var(--orange);}
.accent{color:var(--accent);}
.chip{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);}
.chip.vfa{background:rgba(62,207,142,.15);color:var(--green);}
.chip.ahead{background:rgba(91,142,240,.15);color:var(--accent2);}
.chip.sa{background:rgba(91,142,240,.1);color:#8ab4f5;}
.chip.ot{background:rgba(123,130,160,.15);color:var(--text-muted);}
.chip.sb{background:rgba(240,197,91,.15);color:var(--yellow);}
.chip.behind{background:rgba(240,124,58,.15);color:var(--orange);}
.chip.vfb{background:rgba(240,91,91,.15);color:var(--red);}
.action-cell{font-size:11px;line-height:1.6;max-width:300px;}
.pace-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;border-bottom:1px solid rgba(46,49,71,.4);}
.setting-row:nth-child(odd){border-right:1px solid var(--border);}
.setting-label{color:var(--text-muted);font-size:11px;}
.setting-val{font-family:var(--mono);font-size:12px;font-weight:500;}
.setting-rec{font-family:var(--mono);font-size:11px;color:var(--accent);}
.diagnosis-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;}
.diagnosis-header{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.diagnosis-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);}
.confidence-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;font-family:var(--mono);margin-left:auto;}
.confidence-badge.high{background:rgba(62,207,142,.15);color:var(--green);}
.confidence-badge.medium{background:rgba(240,197,91,.15);color:var(--yellow);}
.confidence-badge.low{background:rgba(240,91,91,.15);color:var(--red);}
.diagnosis-body{padding:16px;}
.diag-row{margin-bottom:12px;}
.diag-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);margin-bottom:4px;}
.diag-text{font-size:12px;line-height:1.6;}
.priority-box{background:rgba(232,160,69,.06);border:1px solid rgba(232,160,69,.2);border-radius:8px;padding:14px 16px;margin-bottom:14px;}
.priority-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--accent);margin-bottom:10px;}
.priority-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.priority-item:last-child{margin-bottom:0;}
.priority-num{min-width:20px;height:20px;background:var(--accent);color:#000;font-size:10px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.priority-text{font-size:12px;line-height:1.5;}
.log-entry{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;margin-bottom:6px;}
.log-meta{display:flex;gap:12px;margin-bottom:5px;align-items:center;flex-wrap:wrap;}
.log-date{font-family:var(--mono);font-size:11px;color:var(--accent);}
.log-occ{font-family:var(--mono);font-size:12px;font-weight:600;}
.log-7d,.log-15d{font-size:11px;color:var(--text-muted);}
.log-issue{font-size:11px;color:var(--yellow);font-style:italic;}
.log-action{font-size:12px;line-height:1.5;}
.loading-shimmer{height:12px;background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:3px;width:85%;margin:3px 0;}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:12px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);margin-bottom:8px;}
.pace-status-col{display:flex;gap:6px;align-items:center;}
.note-banner{background:rgba(240,197,91,.08);border:1px solid rgba(240,197,91,.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--yellow);}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-mark">PH</div>
    <div><span class="logo-text">ProHosts</span><span class="logo-sub">Revenue Manager</span></div>
  </div>
  <span class="review-date" id="review-date"></span>
</div>

<div class="api-key-bar">
  <span class="api-key-label">🔑 Anthropic API Key</span>
  <input class="api-key-input" id="api-key-input" type="password" placeholder="sk-ant-api03-..." oninput="validateKey(this)">
  <span class="api-key-status" id="api-key-status" style="color:var(--text-dim)">Enter key to enable AI analysis</span>
  <a href="https://console.anthropic.com/settings/keys" target="_blank" style="font-size:11px;color:var(--accent2);margin-left:auto;text-decoration:none">Get key at console.anthropic.com →</a>
</div>

<div id="upload-section">
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('csv-input').click()">
    <div class="upload-icon">📊</div>
    <div class="upload-title">Drop your PriceLabs CSV here</div>
    <div class="upload-sub">PriceLabs → Dynamic Pricing → Pricing Dashboard → Export CSV</div>
    <div class="upload-hint">PriceLabs_ManageListings_[DATE].csv</div>
    <input type="file" id="csv-input" accept=".csv" onchange="handleFileUpload(event)">
  </div>
</div>

<div id="file-loaded-section" style="display:none">
  <div class="file-loaded">
    <span class="file-loaded-icon">✓</span>
    <div>
      <div style="font-weight:500" id="file-name-display"></div>
      <div class="muted" style="font-size:11px" id="file-meta-display"></div>
    </div>
    <button class="btn-secondary" style="margin-left:auto" onclick="resetUpload()">Replace File</button>
  </div>
</div>

<div class="run-section" id="run-section" style="display:none">
  <button class="btn-run" id="run-btn" onclick="runAnalysis()">
    <span id="run-spinner" class="spinner"></span>
    <span id="run-label">▶ Run Weekly Analysis</span>
  </button>
  <span id="run-status" class="muted" style="font-size:12px"></span>
</div>

<div id="main-content" style="display:none">
  <div class="tabs-wrapper" id="tabs-wrapper"></div>
  <div id="tab-panels"></div>
</div>

<div id="toast" class="toast"></div>

let csvData=null, results={}, currentTab='portfolio';

// ─── INIT ─────────────────────────────────────────────────────
document.getElementById('review-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
const uz=document.getElementById('upload-zone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag-over');});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag-over'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag-over');if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);});
function handleFileUpload(e){if(e.target.files[0])processFile(e.target.files[0]);}

function processFile(file){
  const r=new FileReader();
  r.onload=e=>{
    csvData=parseCSV(e.target.result);
    const m=KEYS.filter(k=>findRow(PROPS[k].csvName,csvData)).length;
    document.getElementById('upload-section').style.display='none';
    document.getElementById('file-loaded-section').style.display='block';
    document.getElementById('run-section').style.display='flex';
    document.getElementById('file-name-display').textContent=file.name;
    document.getElementById('file-meta-display').textContent=`${csvData.length-1} listings in CSV · ${m}/7 STR properties matched`;
    buildUI();
    document.getElementById('main-content').style.display='block';
  };
  r.readAsText(file);
}
function resetUpload(){csvData=null;results={};['upload-section','file-loaded-section','run-section','main-content'].forEach((id,i)=>document.getElementById(id).style.display=i?'none':'block');document.getElementById('csv-input').value='';}

// ─── CSV ──────────────────────────────────────────────────────
function parseCSV(txt){
  const ls=txt.split('\n').filter(l=>l.trim());
  const hdrs=csvLine(ls[0]);
  return ls.slice(1).map(l=>{const v=csvLine(l);const o={};hdrs.forEach((h,i)=>o[h.trim()]=(v[i]||'').trim());return o;});
}
function csvLine(l){const r=[];let c='',q=false;for(const ch of l){if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function findRow(name,data){return data.find(r=>{const n=(r['Listing Name']||'').toLowerCase();return n.includes(name.toLowerCase())||name.toLowerCase().split(' ').some(w=>w.length>3&&n.includes(w));});}
function pct(v){if(!v||v==='-'||/blocked/i.test(v))return null;return parseFloat(v.replace('%',''))/100;}
function dol(v){if(!v||v==='-'||/blocked/i.test(v))return null;return parseFloat(v.replace(/[$,\s]/g,''));}
function num(v){return v!==null&&v!==undefined?v:null;}

function getRow(key){
  const p=PROPS[key],row=findRow(p.csvName,csvData);
  if(!row)return null;
  return{
    base:dol(row['Base Price']),min:dol(row['Min Price']),max:dol(row['Max Price']),
    occ7:pct(row['Total Occupancy ( Next 7 Days )']),
    occ30:pct(row['Total Occupancy ( Next 30 Days )']),
    occ60:pct(row['Total Occupancy ( Next 60 Days )']),
    occ90:pct(row['Total Occupancy ( Next 90 Days )']),
    occ120:pct(row['Total Occupancy ( Next 120 Days )']),
    mocc30:pct(row['Total Market Occupancy Next 30 Days']),
    mocc60:pct(row['Total Market Occupancy Next 60 Days']),
    mocc90:pct(row['Total Market Occupancy Next 90 Days']),
    wocc30:pct(row['Weekend Total Occupancy ( Next 30 Days )']),
    adr:dol(row['ADR ( Past 30 Days )']),revpar:dol(row['RevPAR ( Past 30 Days )']),
    rev_ytd:dol(row['Total Revenue ( YTD )']),occ_past:pct(row['Total Occupancy ( Past 30 Days )']),
    n7:parseInt(row['Nights Booked ( Past 7 Days )'])||0,
    n15:parseInt(row['Nights Booked ( Past 15 Days )'])||0,
    last_book:row['Last Booked Date']||'—',rec_base:dol(row['Recommended Base Price']),
  };
}

// ─── STATUS ───────────────────────────────────────────────────
function status(cur,tgt){
  if(cur===null)return{label:'N/A',cls:'ot',v:null};
  const v=cur-tgt;
  if(v>=.13)return{label:'Very Far Ahead',cls:'vfa',v};
  if(v>=.06)return{label:'Ahead',cls:'ahead',v};
  if(v>=.03)return{label:'Slightly Ahead',cls:'sa',v};
  if(v>=-0.02)return{label:'On Track',cls:'ot',v};
  if(v>=-0.05)return{label:'Slightly Behind',cls:'sb',v};
  if(v>=-0.12)return{label:'Behind',cls:'behind',v};
  return{label:'Very Far Behind',cls:'vfb',v};
}
function dotCls(ss){
  if(ss.some(s=>s.cls==='vfb'))return'red';
  if(ss.some(s=>s.cls==='behind'))return'orange';
  if(ss.some(s=>s.cls==='sb'))return'yellow';
  return'green';
}
const fp=v=>v!==null?Math.round(v*100)+'%':'N/A';
const fd=v=>v!==null?'$'+Math.round(v).toLocaleString():'N/A';
const fv=v=>v===null?'—':(v>=0?'+':'')+Math.round(v*100)+'%';
const fpp=v=>v!==null?(Math.round(v*100))+'%':'—';
const colorMap={vfa:'#3ecf8e',ahead:'#5b8ef0',sa:'#8ab4f5',ot:'#7b82a0',sb:'#f0c55b',behind:'#f07c3a',vfb:'#f05b5b'};

// ─── BUILD UI ─────────────────────────────────────────────────
function buildUI(){
  const tw=document.getElementById('tabs-wrapper'),tp=document.getElementById('tab-panels');
  tw.innerHTML='';tp.innerHTML='';
  const addTab=(id,label,dotId)=>{
    const t=document.createElement('div');t.className='tab'+(id==='portfolio'?' active':'');
    t.dataset.tab=id;t.innerHTML=`<div class="tab-dot" id="${dotId}"></div>${label}`;
    t.onclick=()=>switchTab(id);tw.appendChild(t);
  };
  addTab('portfolio','Portfolio','dot-portfolio');
  KEYS.forEach(k=>addTab(k,k,`dot-${k.replace(/\s/g,'-')}`));

  const addPanel=(id,html)=>{
    const p=document.createElement('div');p.className='tab-content'+(id==='portfolio'?' active':'');
    p.id=`panel-${id.replace(/\s/g,'-')}`;p.innerHTML=html;tp.appendChild(p);
  };
  addPanel('portfolio',buildPortfolio());
  KEYS.forEach(k=>addPanel(k,buildProp(k)));

function switchTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.tab-content').forEach(p=>p.classList.toggle('active',p.id===`panel-${id.replace(/\s/g,'-')}`));
  currentTab=id;
}

// ─── RUN ANALYSIS ─────────────────────────────────────────────

function validateKey(input){
  const v=input.value.trim();
  const valid=v.startsWith('sk-ant-');
  input.classList.toggle('valid',valid);
  const st=document.getElementById('api-key-status');
  if(valid){st.textContent='✓ Key looks valid';st.style.color='var(--green)';}
  else if(v.length>0){st.textContent='Key should start with sk-ant-';st.style.color='var(--red)';}
  else{st.textContent='Enter key to enable AI analysis';st.style.color='var(--text-dim)';}
}
function getApiKey(){return document.getElementById('api-key-input').value.trim();}

async function runAnalysis(){
  if(!csvData)return;
  const apiKey=getApiKey();
  if(!apiKey||!apiKey.startsWith('sk-ant-')){
    toast('⚠️ Please enter your Anthropic API key above first.');
    document.getElementById('api-key-input').focus();
    return;
  }
  const btn=document.getElementById('run-btn'),sp=document.getElementById('run-spinner'),lbl=document.getElementById('run-label'),st=document.getElementById('run-status');
  btn.disabled=true;sp.style.display='block';lbl.textContent='Analyzing…';
  for(let i=0;i<KEYS.length;i++){
    const k=KEYS[i];st.textContent=`Analyzing ${k} (${i+1}/${KEYS.length})…`;
    const sk=k.replace(/\s/g,'-');
    ['d30','d60','d90','d120'].forEach(w=>{const el=document.getElementById(`act-${sk}-${w}`);if(el)el.innerHTML='<div class="loading-shimmer"></div>';});
    try{results[k]=await analyzeOne(k);updateUI(k,results[k]);}catch(e){results[k]={error:true,diagnosis:'Analysis failed.',actions:{d30:'Error',d60:'Error',d90:'Error',d120:'Error'},priority_actions:['Analysis failed — try again'],key_issue:'Error',confidence:'LOW'};}
    await new Promise(r=>setTimeout(r,400));
  }
  document.getElementById('port-grid').innerHTML=KEYS.map(k=>portCard(k)).join('');
  btn.disabled=false;sp.style.display='none';lbl.textContent='▶ Re-run Analysis';
  st.textContent=`✓ Done — ${new Date().toLocaleTimeString()}`;
  toast('Analysis complete — all 7 properties reviewed.');
}

MARGIN FLOOR: $${p.floor}

RECENT DECISIONS (last 3 weeks):
${recentLog}

PROHOSTS DECISION ENGINE RULES:
Step 1: Check for exceptions (fire damage, owner blocks, new listing, holidays) — if exception exists, flag it
Step 2: Fix closest broken window first (30d → 60d → 90d → 120d)
Step 3: Check booking velocity — 7d and 15d bookings
Step 4: Protect ADR — never discount without cause
Step 5: Weekend demand vs weekday demand
Step 6: Market occ vs property occ
Step 7: Lead time vs historical norm
Step 8: Listing conversion if market high but property low
Step 9: Far-out inventory demand
Step 10: LOS optimization — orphan nights

PACE STATUS THRESHOLDS:
Very Far Ahead ≥+13% | Ahead +6–12% | Slightly Ahead +3–5% | On Track ±2% | Slightly Behind -3–5% | Behind -6–12% | Very Far Behind ≤-13%

CRITICAL RULES:
- NEVER recommend more than 2 priority actions
- Always give specific dollar amounts or exact percentages in recommendations
- Fix 30d window first, then 60d, then 90d
- Protect ADR — diagnose before discounting
- Never lower price below margin floor of $${p.floor}
- Change as few variables as possible

Return this exact JSON:
{
  "diagnosis": "2-3 sentence summary of what is happening",
  "evidence": "specific metrics supporting the diagnosis",
  "rules": "which ProHosts rules are triggered (cite rule numbers)",
  "expected": "expected outcome and timeframe if recommendations are followed",
  "key_issue": "5–8 word summary of the single biggest issue",
  "confidence": "HIGH or MEDIUM or LOW",
  "priority_actions": [
    "PRIORITY 1: Exact PriceLabs action with specific numbers (e.g. Lower base from $190 to $181 — apply 10% weekday discount Sun–Thu inside 21 days)",
    "PRIORITY 2: Second most important action with exact specifics"
  ],
  "actions": {
    "d30": "Specific action for 30-day window or 'Hold — on track'",
    "d60": "Specific action for 60-day window or 'Hold — monitor'",
    "d90": "Specific action for 90-day window or 'No action needed'",
    "d120": "Specific action for 120-day window or 'No action needed'"
  },
  "settings": {
    "base": "e.g. 'Lower to $181' or 'Hold at $190' or 'Raise to $200'",
    "min": "e.g. 'Hold at $125' or 'Lower to $115'",
    "max": "e.g. 'Hold at $450' or 'Raise to $475'",
    "weekday": "e.g. '-10% Sun–Thu inside 21 days' or 'None needed'"
  }
}`;

  const apiKey=getApiKey();const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  const data=await resp.json();
  const txt=(data.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
  try{return JSON.parse(txt);}catch{return{diagnosis:txt.substring(0,200),evidence:'—',rules:'—',expected:'—',key_issue:'Parse error',confidence:'LOW',priority_actions:['Parse error — check console'],actions:{d30:'—',d60:'—',d90:'—',d120:'—'},settings:{base:'—',min:'—',max:'—',weekday:'—'}};}
}

function updateUI(k,r){
  const sk=k.replace(/\s/g,'-'),d=getRow(k),p=PROPS[k];
  ['d30','d60','d90','d120'].forEach(w=>{const el=document.getElementById(`act-${sk}-${w}`);if(el&&r.actions?.[w])el.innerHTML=r.actions[w];});
  ['base','min','max'].forEach(s=>{const el=document.getElementById(`rec-${s}-${sk}`);if(el&&r.settings?.[s]){el.textContent=r.settings[s];el.style.color='var(--accent)';}});
  const wd=document.getElementById(`rec-wd-${sk}`);if(wd&&r.settings?.weekday)wd.textContent=r.settings.weekday;
  const db=document.getElementById(`diag-body-${sk}`);if(db)db.innerHTML=diagHTML(r);
  const dh=document.getElementById(`diag-${sk}`)?.querySelector('.diagnosis-header');
  if(dh&&r.confidence){let b=dh.querySelector('.confidence-badge');if(!b){b=document.createElement('span');b.className='confidence-badge';dh.appendChild(b);}b.className=`confidence-badge ${(r.confidence||'medium').toLowerCase()}`;b.textContent=`${r.confidence} CONFIDENCE`;}
  // Update Table 5 this-week entry
  const logEl=document.getElementById(`log-${sk}`);
  if(logEl&&d){
    const entry=`<div class="log-entry" style="border-color:var(--accent);border-width:1.5px">
      <div class="log-meta">
        <span class="log-date" style="background:var(--accent);color:#000;padding:1px 6px;border-radius:4px">THIS WEEK</span>
        <span class="log-occ">${fp(d.occ30)} 30d occ</span>
        <span class="log-7d">7d: ${d.n7}</span><span class="log-15d">15d: ${d.n15}</span>
        <span class="log-issue">${r.key_issue||''}</span>
      </div>
      <div class="log-action">${(r.priority_actions||[]).join(' · ')}</div>
    </div>`;
    const old=logEl.innerHTML.replace(/<div class="log-entry" style="border-style:dashed[^]*?<\/div>\s*<\/div>/,'').replace(/<div class="log-entry" style="border-color:var\(--accent\)[^]*?<\/div>\s*<\/div>/,'');
    logEl.innerHTML=entry+old;
  }
  // Update tab dot
  const dot=document.getElementById(`dot-${sk}`);
  if(dot&&d){const ss=[status(d.occ30,p.pace.d30),status(d.occ60,p.pace.d60),status(d.occ90,p.pace.d90)];dot.className=`tab-dot ${dotCls(ss)}`;}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>
